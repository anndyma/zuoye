<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇学习大冒险 · 一年级语文数学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:"Comic Sans MS","PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(-45deg,#a1c4fd,#c2e9fb,#fbc2eb,#a6c1ee,#84fab0);
  background-size:400% 400%;
  animation:bgShift 18s ease infinite;
  color:#333;user-select:none;
}
@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.hidden{display:none!important;}
/* ---------- 漂浮装饰 ---------- */
#bgDeco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.floaty{position:absolute;font-size:34px;opacity:.5;animation:floaty linear infinite;}
@keyframes floaty{
  0%{transform:translateY(110vh) rotate(0deg);}
  100%{transform:translateY(-15vh) rotate(360deg);}
}
/* ---------- 通用 ---------- */
.screen{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.btn{
  border:none;cursor:pointer;font-family:inherit;font-weight:bold;color:#fff;
  border-radius:999px;padding:12px 30px;font-size:18px;
  box-shadow:0 5px 0 rgba(0,0,0,.18),0 8px 18px rgba(0,0,0,.15);
  transition:transform .12s,box-shadow .12s,filter .2s;
}
.btn:hover{filter:brightness(1.08);}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.18);}
.btn-big{display:block;width:min(320px,80vw);margin:10px auto;font-size:20px;padding:15px;}
.btn-primary{background:linear-gradient(135deg,#ff9a44,#ff5e62);}
.btn-shop{background:linear-gradient(135deg,#f7b733,#fc4a1a);}
.btn-info{background:linear-gradient(135deg,#36d1dc,#5b86e5);}
.btn-green{background:linear-gradient(135deg,#56ab2f,#a8e063);}
.btn-purple{background:linear-gradient(135deg,#7f53ac,#647dee);}
.btn-small{padding:8px 18px;font-size:15px;background:linear-gradient(135deg,#36d1dc,#5b86e5);}
.btn:disabled{filter:grayscale(.7);cursor:not-allowed;opacity:.7;}
.coin-pill{
  display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.85);
  border-radius:999px;padding:7px 16px;font-size:17px;color:#b8860b;
  box-shadow:0 3px 10px rgba(0,0,0,.12);font-weight:bold;
}
.title-badge{
  display:inline-block;background:linear-gradient(135deg,#f7971e,#ffd200);color:#7a4a00;
  border-radius:999px;padding:7px 18px;font-weight:bold;font-size:16px;
  box-shadow:0 3px 10px rgba(0,0,0,.15);
}
/* ---------- 首页 ---------- */
.home-card{
  position:relative;z-index:2;text-align:center;background:rgba(255,255,255,.72);
  backdrop-filter:blur(8px);border-radius:32px;padding:38px 34px;max-width:520px;width:94vw;
  box-shadow:0 20px 60px rgba(80,80,160,.25);border:3px solid rgba(255,255,255,.9);
  animation:cardIn .6s cubic-bezier(.2,1.4,.4,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.9)}to{opacity:1;transform:none}}
.logo-snake{font-size:74px;animation:wiggle 2s ease-in-out infinite;filter:drop-shadow(0 6px 8px rgba(0,0,0,.2));}
@keyframes wiggle{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.1)}}
.game-title{
  font-size:clamp(30px,7vw,44px);margin:8px 0 4px;
  background:linear-gradient(90deg,#ff5e62,#f7b733,#56ab2f,#36d1dc,#7f53ac,#ff5e62);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:rainbowText 5s linear infinite;
}
@keyframes rainbowText{to{background-position:300% 0}}
.subtitle{color:#666;font-size:16px;margin-bottom:16px;}
.home-stats{display:flex;gap:12px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.speed-row{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:16px;flex-wrap:wrap;}
.speed-label{font-weight:bold;color:#557;font-size:15px;}
.speed-btn{
  border:3px solid transparent;font-family:inherit;font-weight:bold;font-size:15px;
  padding:8px 16px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.65);color:#557;transition:.2s;
}
.speed-btn.active{background:linear-gradient(135deg,#56ab2f,#a8e063);color:#fff;box-shadow:0 4px 12px rgba(86,171,47,.4);transform:scale(1.08);}
.mini-row{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.btn-mini{
  border:2px solid #cdd7ff;font-family:inherit;font-weight:bold;font-size:14px;
  padding:8px 18px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.7);color:#4a5a9a;transition:.2s;
}
.btn-mini:hover{background:#e8eeff;transform:scale(1.05);}
#qSpeak{
  position:absolute;top:14px;right:14px;font-size:20px;border:none;cursor:pointer;
  background:#eef3ff;border-radius:50%;width:42px;height:42px;
  box-shadow:0 3px 8px rgba(0,0,0,.12);transition:transform .15s;
}
#qSpeak:hover{transform:scale(1.15);background:#dce8ff;}
/* ---------- 顶栏 ---------- */
.bar{
  width:100%;max-width:1100px;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.75);backdrop-filter:blur(6px);border-radius:20px;
  padding:10px 14px;box-shadow:0 6px 18px rgba(0,0,0,.1);z-index:3;flex-wrap:wrap;
}
.bar h2{font-size:20px;color:#4a4a8a;flex:1;text-align:center;}
#soundBtn{
  position:fixed;top:12px;right:12px;z-index:50;font-size:22px;border:none;cursor:pointer;
  background:rgba(255,255,255,.85);border-radius:50%;width:46px;height:46px;
  box-shadow:0 4px 12px rgba(0,0,0,.18);transition:transform .15s;
}
#soundBtn:active{transform:scale(.9);}
/* ---------- 地图 ---------- */
#scr-map{justify-content:flex-start;gap:10px;}
#mapArea{
  position:relative;width:100%;max-width:1100px;flex:1;min-height:0;
  background:rgba(255,255,255,.35);border-radius:24px;overflow-y:auto;overflow-x:hidden;
  box-shadow:inset 0 4px 20px rgba(0,0,0,.08);border:2px solid rgba(255,255,255,.8);
}
#mapInner{position:relative;width:100%;height:1050px;}
#mapSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.map-node{
  position:absolute;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;
  border:4px solid #fff;font-size:24px;font-weight:bold;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 6px 14px rgba(0,0,0,.25);transition:transform .15s;
}
.map-node:hover{transform:translate(-50%,-50%) scale(1.15);}
.map-node .lv-num{font-size:20px;line-height:1;}
.map-node .lv-stars{font-size:10px;line-height:1.1;letter-spacing:-1px;}
.node-done{background:linear-gradient(135deg,#56ab2f,#a8e063);}
.node-cur{background:linear-gradient(135deg,#ff9a44,#ff5e62);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,94,98,.6)}50%{box-shadow:0 0 0 16px rgba(255,94,98,0)}}
.node-lock{background:linear-gradient(135deg,#9e9e9e,#cfcfcf);cursor:not-allowed;}
.node-tag{position:absolute;transform:translate(-50%,0);font-size:11px;font-weight:bold;color:#5a5a9a;background:rgba(255,255,255,.85);padding:2px 8px;border-radius:8px;white-space:nowrap;}
.map-legend{position:absolute;left:12px;top:10px;font-size:13px;color:#666;background:rgba(255,255,255,.8);padding:6px 10px;border-radius:10px;line-height:1.6;}
/* ---------- 商城 ---------- */
#scr-shop{justify-content:flex-start;gap:10px;}
.tabs{display:flex;gap:8px;z-index:2;}
.tab-btn{border:none;font-family:inherit;font-weight:bold;font-size:16px;padding:10px 22px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.6);color:#557;transition:.2s;}
.tab-btn.active{background:linear-gradient(135deg,#7f53ac,#647dee);color:#fff;box-shadow:0 4px 12px rgba(100,100,200,.4);}
#shopGrid{
  width:100%;max-width:900px;flex:1;min-height:0;overflow-y:auto;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;padding:6px 4px 20px;
}
.shop-item{
  background:rgba(255,255,255,.85);border-radius:20px;padding:16px 10px;text-align:center;
  box-shadow:0 6px 16px rgba(0,0,0,.1);border:3px solid transparent;transition:.2s;
  animation:cardIn .4s cubic-bezier(.2,1.4,.4,1);
}
.shop-item.equipped{border-color:#ffd200;box-shadow:0 0 18px rgba(255,210,0,.5);}
.shop-icon{font-size:44px;margin-bottom:6px;min-height:52px;display:flex;align-items:center;justify-content:center;}
.skin-dot{width:44px;height:44px;border-radius:50%;box-shadow:inset -6px -6px 0 rgba(0,0,0,.15);}
.shop-name{font-weight:bold;color:#445;font-size:15px;margin-bottom:8px;}
.shop-item .btn{padding:7px 16px;font-size:14px;}
/* ---------- 游戏界面 ---------- */
#scr-game{justify-content:flex-start;gap:8px;}
.game-bar{font-size:15px;}
#gameLevelName{font-weight:bold;color:#4a4a8a;font-size:16px;}
#gameHearts{font-size:17px;letter-spacing:2px;}
#gameProgress{font-weight:bold;color:#b8860b;background:rgba(255,255,255,.85);border-radius:999px;padding:6px 14px;box-shadow:0 3px 8px rgba(0,0,0,.1);}
#canvasWrap{
  position:relative;width:100%;max-width:860px;flex:1;min-height:0;display:flex;
  align-items:center;justify-content:center;
}
#gameCanvas{
  background:linear-gradient(160deg,#e8f5e9,#e3f2fd);
  border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.2);border:4px solid #fff;
  max-width:100%;max-height:100%;
}
#dpad{display:none;gap:6px;z-index:3;grid-template-columns:repeat(3,58px);grid-template-rows:repeat(2,58px);}
#dpad button{font-size:24px;border:none;border-radius:14px;background:rgba(255,255,255,.8);box-shadow:0 4px 0 rgba(0,0,0,.15);cursor:pointer;}
#dpad button:active{transform:translateY(3px);box-shadow:none;}
@media (pointer:coarse){#dpad{display:grid;}}
/* ---------- 答题浮层 ---------- */
#qOverlay{
  position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;
  background:rgba(40,40,80,.45);backdrop-filter:blur(3px);border-radius:20px;animation:fadeIn .25s;
}
.q-card{
  position:relative;
  background:linear-gradient(160deg,#ffffff,#f3f7ff);border-radius:26px;padding:24px 26px;
  width:min(460px,92%);text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.35);
  border:4px solid #ffd76e;animation:qPop .35s cubic-bezier(.2,1.6,.4,1);
}
@keyframes qPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
#qTag{display:inline-block;background:linear-gradient(135deg,#36d1dc,#5b86e5);color:#fff;font-size:13px;font-weight:bold;padding:4px 14px;border-radius:999px;margin-bottom:10px;}
#qText{font-size:clamp(24px,5vw,34px);font-weight:bold;color:#333;margin:8px 0;min-height:48px;}
#qHint{color:#999;font-size:15px;margin-bottom:12px;min-height:20px;}
#qChoices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.choice-btn{
  border:3px solid #cdd7ff;background:#f5f8ff;border-radius:16px;padding:14px 6px;
  font-size:22px;font-weight:bold;color:#4a5a9a;cursor:pointer;font-family:inherit;transition:.15s;
}
.choice-btn:hover{background:#e8eeff;transform:scale(1.04);}
.choice-btn.right{background:#d4f7d4;border-color:#4caf50;color:#2e7d32;animation:rightFlash .5s;}
.choice-btn.wrong{background:#ffd9d9;border-color:#f44336;color:#c62828;animation:shake .4s;}
@keyframes rightFlash{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#qInputRow{display:flex;gap:10px;justify-content:center;}
#qInput{
  flex:1;max-width:240px;font-size:28px;text-align:center;padding:10px;border-radius:16px;
  border:3px solid #cdd7ff;outline:none;font-family:inherit;color:#333;background:#fbfcff;
}
#qInput:focus{border-color:#5b86e5;box-shadow:0 0 12px rgba(91,134,229,.4);}
#qEq{
  flex:1.2;max-width:200px;font-size:24px;text-align:center;padding:10px;border-radius:16px;
  border:3px solid #ffd76e;outline:none;font-family:inherit;color:#333;background:#fffdf5;
}
#qEq:focus{border-color:#ffb300;box-shadow:0 0 12px rgba(255,179,0,.4);}
#qEqSign{font-size:30px;font-weight:bold;color:#b8860b;align-self:center;}
/* ---------- 阳光与云朵 ---------- */
#sun{
  position:fixed;top:-50px;left:-50px;width:170px;height:170px;z-index:0;pointer-events:none;
  background:radial-gradient(circle,#fff9c4 0%,#ffeb3b 45%,#fdd835 60%,rgba(253,216,53,0) 72%);
  border-radius:50%;animation:sunPulse 4s ease-in-out infinite;
}
@keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#sunRays{
  position:absolute;inset:-40px;border-radius:50%;
  background:conic-gradient(from 0deg,rgba(255,235,59,.5) 0deg 12deg,transparent 12deg 30deg,rgba(255,235,59,.5) 30deg 42deg,transparent 42deg 60deg,rgba(255,235,59,.5) 60deg 72deg,transparent 72deg 90deg,rgba(255,235,59,.5) 90deg 102deg,transparent 102deg 120deg,rgba(255,235,59,.5) 120deg 132deg,transparent 132deg 150deg,rgba(255,235,59,.5) 150deg 162deg,transparent 162deg 180deg,rgba(255,235,59,.5) 180deg 192deg,transparent 192deg 210deg,rgba(255,235,59,.5) 210deg 222deg,transparent 222deg 240deg,rgba(255,235,59,.5) 240deg 252deg,transparent 252deg 270deg,rgba(255,235,59,.5) 270deg 282deg,transparent 282deg 300deg,rgba(255,235,59,.5) 300deg 312deg,transparent 312deg 330deg,rgba(255,235,59,.5) 330deg 342deg,transparent 342deg 360deg);
  animation:raysSpin 24s linear infinite;
}
@keyframes raysSpin{to{transform:rotate(360deg)}}
.cloud{
  position:fixed;z-index:0;pointer-events:none;background:rgba(255,255,255,.85);border-radius:999px;
  width:110px;height:36px;box-shadow:28px -14px 0 6px rgba(255,255,255,.85),58px -2px 0 2px rgba(255,255,255,.85);
  animation:cloudDrift linear infinite;opacity:.9;
}
@keyframes cloudDrift{from{transform:translateX(-20vw)}to{transform:translateX(120vw)}}
#qFeedback{font-size:20px;font-weight:bold;margin-top:12px;min-height:28px;}
.fb-right{color:#2e7d32;animation:rightFlash .5s;}
.fb-wrong{color:#c62828;animation:shake .4s;}
/* ---------- 通用弹窗 ---------- */
#modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(30,30,60,.5);backdrop-filter:blur(4px);animation:fadeIn .25s;}
.modal-card{
  background:linear-gradient(160deg,#ffffff,#fdf6e3);border-radius:28px;padding:30px 28px;
  width:min(440px,92vw);text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.4);
  border:4px solid #ffd76e;animation:qPop .4s cubic-bezier(.2,1.6,.4,1);max-height:86vh;overflow-y:auto;
}
.modal-card h2{font-size:26px;color:#4a4a8a;margin-bottom:8px;}
.modal-card .big-emoji{font-size:60px;animation:wiggle 1.6s infinite;}
.modal-card p{color:#666;font-size:16px;margin:8px 0;line-height:1.7;}
.reward-line{font-size:20px;font-weight:bold;color:#b8860b;margin:10px 0;}
.stars-big{font-size:44px;letter-spacing:6px;margin:6px 0;}
.howto{text-align:left;font-size:15px;color:#555;line-height:2;}
#fxCanvas{position:fixed;inset:0;z-index:55;pointer-events:none;}
</style>
</head>
<body>
<div id="sun"><div id="sunRays"></div></div>
<div class="cloud" style="top:12%;animation-duration:55s;"></div>
<div class="cloud" style="top:26%;animation-duration:75s;animation-delay:-30s;transform:scale(.7);"></div>
<div class="cloud" style="top:6%;animation-duration:95s;animation-delay:-60s;transform:scale(.55);"></div>
<div id="bgDeco"></div>
<button id="soundBtn" title="音乐开关">🔊</button>

<!-- 首页 -->
<section id="scr-home" class="screen">
  <div class="home-card">
    <div class="logo-snake">🐍</div>
    <h1 class="game-title">贪吃蛇学习大冒险</h1>
    <p class="subtitle">一年级语文 · 数学（上下册）<br>吃果子、答题目、赚金币、换装扮！</p>
    <div class="home-stats">
      <span class="title-badge" id="homeTitle">🎓 小学童</span>
      <span class="coin-pill">🪙 <b id="homeCoins">0</b></span>
    </div>
    <button class="btn btn-big btn-primary" id="btnStart">🚀 开始冒险</button>
    <button class="btn btn-big btn-shop" id="btnShop">🛒 金币商城</button>
    <button class="btn btn-big btn-info" id="btnHow">📖 玩法说明</button>
    <div class="speed-row">
      <span class="speed-label">🐍 蛇速：</span>
      <button class="speed-btn" data-sp="slow">🐢 慢速</button>
      <button class="speed-btn" data-sp="normal">🐇 中速</button>
      <button class="speed-btn" data-sp="fast">🚀 快速</button>
    </div>
    <div class="mini-row">
      <button class="btn-mini" id="btnBackup">💾 导出备份</button>
      <button class="btn-mini" id="btnImport">📂 导入存档</button>
      <button class="btn-mini" id="btnAutoread">🔇 自动读题：关</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none">
    </div>
  </div>
</section>

<!-- 地图 -->
<section id="scr-map" class="screen hidden">
  <div class="bar">
    <button class="btn btn-small" id="mapBack">🏠 主页</button>
    <h2>🗺️ 冒险地图 · 30 关</h2>
    <span class="title-badge" id="mapTitle">🎓 小学童</span>
    <span class="coin-pill">🪙 <b id="mapCoins">0</b></span>
  </div>
  <div id="mapArea"><div id="mapInner"><svg id="mapSvg"></svg></div></div>
</section>

<!-- 商城 -->
<section id="scr-shop" class="screen hidden">
  <div class="bar">
    <button class="btn btn-small" id="shopBack">🗺️ 地图</button>
    <h2>🛒 金币商城</h2>
    <span class="coin-pill">🪙 <b id="shopCoins">0</b></span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="skin">🎨 蛇蛇皮肤</button>
    <button class="tab-btn" data-tab="hat">🎩 帽子头饰</button>
    <button class="tab-btn" data-tab="title">🏅 荣誉称号</button>
  </div>
  <div id="shopGrid"></div>
</section>

<!-- 游戏 -->
<section id="scr-game" class="screen hidden">
  <div class="bar game-bar">
    <button class="btn btn-small" id="gameExit">🗺️ 地图</button>
    <div id="gameLevelName">第1关</div>
    <div id="gameHearts">❤️❤️❤️</div>
    <div id="gameProgress">⭐ 0/6</div>
    <span class="coin-pill">🪙 <b id="gameCoins">0</b></span>
    <button class="btn btn-small btn-purple" id="gamePause">⏸️</button>
  </div>
  <div id="canvasWrap">
    <canvas id="gameCanvas" width="800" height="560"></canvas>
    <div id="qOverlay" class="hidden">
      <div class="q-card">
        <button id="qSpeak" title="再读一遍题目">🔊</button>
        <div id="qTag">语文</div>
        <div id="qText"></div>
        <div id="qHint"></div>
        <div id="qChoices"></div>
        <div id="qInputRow" class="hidden">
          <input id="qEq" class="hidden" autocomplete="off" inputmode="text" placeholder="算式 如 25-14">
          <span id="qEqSign" class="hidden">=</span>
          <input id="qInput" autocomplete="off" placeholder="输入答案">
          <button class="btn btn-green" id="qSubmit">确定</button>
        </div>
        <div id="qFeedback"></div>
      </div>
    </div>
  </div>
  <div id="dpad">
    <span></span><button data-d="up">⬆️</button><span></span>
    <button data-d="left">⬅️</button><button data-d="down">⬇️</button><button data-d="right">➡️</button>
  </div>
</section>

<canvas id="fxCanvas"></canvas>
<div id="modal" class="hidden"><div class="modal-card" id="modalCard"></div></div>

<script>
/* ==================== 工具函数 ==================== */
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=arr=>arr[rnd(0,arr.length-1)];

/* ==================== 音效系统（WebAudio 合成，无需外部文件） ==================== */
const Sound={
  ctx:null,bgmTimer:null,bgmStep:0,
  ensure(){
    if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
    if(this.ctx&&this.ctx.state==="suspended")this.ctx.resume();
  },
  tone(f,dur=0.15,type="sine",vol=0.2,delay=0){
    if(!save.sound)return;this.ensure();if(!this.ctx)return;
    const t=this.ctx.currentTime+delay;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(this.ctx.destination);
    o.start(t);o.stop(t+dur+0.05);
  },
  click(){this.tone(700,.06,"square",.08);},
  eat(){this.tone(420,.07,"square",.12);this.tone(640,.07,"square",.1,.05);},
  coin(){this.tone(988,.09,"triangle",.2);this.tone(1319,.14,"triangle",.2,.09);},
  correct(){[523,659,784,1047].forEach((f,i)=>this.tone(f,.12,"triangle",.22,i*0.09));},
  wrong(){this.tone(200,.25,"sawtooth",.18);this.tone(150,.3,"sawtooth",.15,.1);},
  hurt(){this.tone(180,.2,"square",.2);},
  levelup(){[523,587,659,784,880,1047].forEach((f,i)=>this.tone(f,.16,"triangle",.22,i*0.1));},
  buy(){[784,988,1175].forEach((f,i)=>this.tone(f,.12,"sine",.2,i*0.08));},
  /* 真人语音（自动挑选最自然的中文发音人） */
  voice:null,
  initVoice(){
    try{
      if(!("speechSynthesis" in window))return;
      const pickV=()=>{
        const vs=speechSynthesis.getVoices();if(!vs.length)return;
        const zh=vs.filter(v=>/zh|cmn|中文|Chinese|Mandarin|普通话/i.test(v.lang+" "+v.name));
        if(!zh.length)return;
        const pref=["Xiaoxiao","Xiaoyi","Yunye","Yunxia","Yunjian","Tingting","Meijia","Huihui","Yaoyao","Google 普通话","Google 中文","Sinji","Lili","Ting","Mei"];
        for(const p of pref){const v=zh.find(v=>v.name.includes(p));if(v){Sound.voice=v;return;}}
        Sound.voice=zh[0];
      };
      pickV();
      speechSynthesis.onvoiceschanged=pickV;
    }catch(e){}
  },
  speak(text,rate=0.98,pitch=1.25){
    if(!save.sound)return;
    try{
      if(!("speechSynthesis" in window))return;
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang="zh-CN";u.rate=rate;u.pitch=pitch;u.volume=1;
      if(this.voice)u.voice=this.voice;
      speechSynthesis.speak(u);
    }catch(e){}
  },
  readQ(text){this.speak(text,0.88,1.1);},
  praise(){this.speak(pick(["你真棒！","太厉害了！","回答正确，你真聪明！","完全正确，继续加油！","好样的，你真是个小学霸！"]))},
  encourage(){this.speak(pick(["没关系，继续加油！","别灰心，你一定可以的！","再想一想，下次一定对！"]))},
  praiseCoin(){this.speak(pick(["真棒，金币到手啦！","哇，好多金币！","太厉害了，金币加十！"]))},
  startBgm(){
    if(this.bgmTimer||!save.sound)return;this.ensure();
    const scale=[262,294,330,392,440,523,587,659];
    const mel=[0,2,4,2,5,4,2,0,4,5,7,5,4,2,1,2];
    this.bgmTimer=setInterval(()=>{
      if(!save.sound){this.stopBgm();return;}
      const n=mel[this.bgmStep%mel.length];
      this.tone(scale[n],.22,"sine",.06);
      if(this.bgmStep%4===0)this.tone(scale[n]/2,.3,"triangle",.04);
      this.bgmStep++;
    },320);
  },
  stopBgm(){if(this.bgmTimer){clearInterval(this.bgmTimer);this.bgmTimer=null;}}
};
Sound.initVoice();

});

const fx=$("#fxCanvas"),fctx=fx.getContext("2d");
let fxParts=[],fxRunning=false;
function fxResize(){fx.width=innerWidth;fx.height=innerHeight;}
fxResize();addEventListener("resize",fxResize);
function confetti(n=120){
  const colors=["#ff5e62","#f7b733","#56ab2f","#36d1dc","#7f53ac","#ffd200"];
  for(let i=0;i<n;i++){
    fxParts.push({x:Math.random()*fx.width,y:-20-Math.random()*fx.height*0.3,
      vx:(Math.random()-.5)*2,vy:2+Math.random()*3,r:4+Math.random()*5,
      c:pick(colors),rot:Math.random()*Math.PI,vr:(Math.random()-.5)*.2,life:1});
  }
  if(!fxRunning){fxRunning=true;fxLoop();}
}
function fxLoop(){
  fctx.clearRect(0,0,fx.width,fx.height);
  fxParts=fxParts.filter(p=>p.y<fx.height+30);
  for(const p of fxParts){
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
    fctx.save();fctx.translate(p.x,p.y);fctx.rotate(p.rot);
    fctx.fillStyle=p.c;fctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6);fctx.restore();
  }
  if(fxParts.length){requestAnimationFrame(fxLoop);}else{fxRunning=false;fctx.clearRect(0,0,fx.width,fx.height);}
}

/* 数学 · 找规律 */
function genQ_rule(){
  if(Math.random()<0.55){
    const start=rnd(1,15),step=pick([2,3,5,10]);
    const seq=[];for(let i=0;i<4;i++)seq.push(start+step*i);
    const ans=String(start+step*4);
    const opts=new Set([ans]);let g=0;
    while(opts.size<4&&g++<40){const c=String(start+step*4+pick([-2,-1,1,2,step]));if(c!==ans)opts.add(c);}
    return {kind:"choice",tag:"数学 · 找规律",q:`${seq.join("、")}、(　)`,
      hint:"看看相邻两个数相差几",options:shuffle([...opts]),answer:ans,
      say:`找规律。${seq.join("，")}，后面一个是几？`};
  }
  const pats=[["🔴","🔵"],["⭐","🌙"],["🍎","🍌"],["🔺","⭕"],["🐱","🐶"]];
  const p=pick(pats);
  const len=rnd(4,5);
  const seq=[];for(let i=0;i<len;i++)seq.push(p[i%2]);
  const ans=p[len%2];
  const opts=shuffle([p[0],p[1],"🔶","❌"].slice(0,4).concat([ans]).filter((v,i,arr)=>arr.indexOf(v)===i).slice(0,4));
  if(!opts.includes(ans))opts[0]=ans;
  return {kind:"choice",tag:"数学 · 找规律",q:`${seq.join(" ")} 下一个是？`,
    hint:"看看图形是怎么重复的",options:opts,answer:ans,
    say:"找规律。下一个图形是什么？"};
}

function genQ_numknow(){
  const makers=[
    ()=>({q:"最大的两位数是几？",a:"99",opts:["99","90","98","100"]}),
    ()=>({q:"最小的两位数是几？",a:"10",opts:["10","11","20","100"]}),
    ()=>({q:"100 里面有几个十？",a:"10 个",opts:["10 个","1 个","100 个","5 个"]}),
    ()=>{const t=rnd(1,9),o=rnd(1,9);
      return {q:`${t*10+o} 里面有几个十和几个一？`,a:`${t} 个十和 ${o} 个一`,
        opts:[`${t} 个十和 ${o} 个一`,`${o} 个十和 ${t} 个一`,`${t} 个十和 ${o===9?o-1:o+1} 个一`,`${t===9?t-1:t+1} 个十和 ${o} 个一`]};},
    ()=>{const t=rnd(1,9),o=rnd(1,9);
      return {q:`${t} 个十和 ${o} 个一组成的数是几？`,a:String(t*10+o),
        opts:[String(t*10+o),String(o*10+t),String(t*10+o+1>99?98:t*10+o+1),String(Math.min(99,(t+1)*10+o))]};},
    ()=>{const n=rnd(11,98);
      return {q:`和 ${n} 相邻的两个数是？`,a:`${n-1} 和 ${n+1}`,
        opts:[`${n-1} 和 ${n+1}`,`${n} 和 ${n+1}`,`${n-2} 和 ${n+2}`,`${n-1} 和 ${n}`]};},
    ()=>{const n=rnd(11,99);
      return {q:`${n} 的十位上是几？`,a:String(Math.floor(n/10)),
        opts:[String(Math.floor(n/10)),String(n%10),String(Math.floor(n/10)+1),String((n%10)+2)]};}
  ];
  const m=pick(makers)();
  const opts=[...new Set(m.opts)];
  let guard=0;
  while(opts.length<4&&guard++<60){const c=String(rnd(1,100));if(!opts.includes(c)&&c!==m.a)opts.push(c);}
  shuffle(opts);
  return {kind:"choice",tag:"数学 · 数的认识",q:m.q,hint:"想一想数位",options:opts,answer:m.a,say:m.q};
}

/* 数学 · 位置与顺序 */
function genQ_pos(){
  const pool=shuffle([["🐱","小猫"],["🐶","小狗"],["🐰","小兔"],["🐯","小老虎"],["🐵","小猴"],["🐤","小鸡"]]).slice(0,4);
  const row=pool.map(a=>a[0]).join(" ");
  if(Math.random()<0.5){
    const i=rnd(0,3);
    const dir=Math.random()<0.5?"左":"右";
    const pos=dir==="左"?i+1:4-i;
    return {kind:"choice",tag:"数学 · 位置与顺序",q:`${row}　从${dir}边数，${pool[i][1]}排第几？`,
      hint:"数一数，从左或从右",options:shuffle(["第 1","第 2","第 3","第 4"]),answer:`第 ${pos}`,
      say:`小动物排队。从${dir}边数，${pool[i][1]}排第几？`};
  }
  const i=rnd(1,2),j=Math.random()<0.5?i-1:i+1;
  const ans=j<i?"左边":"右边";
  return {kind:"choice",tag:"数学 · 位置与顺序",q:`${row}　${pool[j][1]}在${pool[i][1]}的哪一边？`,
    hint:"伸出左右手比一比",options:shuffle(["左边","右边","上边","下边"]),answer:ans,

}

function genQ_poem(){
  const type=rnd(0,2),p=pick(POEMS);
  if(type===0){
    const i=rnd(0,p.lines.length-2);
    const ans=p.lines[i+1];
    const opts=[ans];let g=0;
    while(opts.length<4&&g++<60){const l=pick(pick(POEMS).lines);if(!opts.includes(l))opts.push(l);}
    return {kind:"choice",tag:"语文 · 古诗接龙",q:`《${p.t}》“${p.lines[i]}”的下一句是？`,hint:"大声背一背这首诗",
      options:shuffle(opts),answer:ans,say:`古诗，${p.t}。${p.lines[i]}，的下一句是什么？`};
  }
  if(type===1){
    const opts=[p.a];let g=0;
    while(opts.length<4&&g++<40){const c=pick(POEM_AUTHORS);if(!opts.includes(c))opts.push(c);}
    return {kind:"choice",tag:"语文 · 古诗作者",q:`《${p.t}》的作者是？`,hint:"背一背这首诗就想起来啦",
      options:shuffle(opts),answer:p.a,say:`古诗${p.t}，的作者是谁？`};
  }
  const i=rnd(0,p.lines.length-1),line=p.lines[i],ch=line[line.length-1];
  const opts=[ch];let g=0;
  while(opts.length<4&&g++<80){const l=pick(pick(POEMS).lines);const c=l[l.length-1];if(!opts.includes(c))opts.push(c);}

  const opts=shuffle([ans,`${n-1} 和 ${n+1}`,`${n} 和 ${n+10}`,`${n-20} 和 ${n+20}`]);
  return {kind:"choice",tag:"数学 · 百数表",q:`和整十数 ${n} 相邻的两个整十数是？`,hint:"整十数就是 10、20、30……",
    options:opts,answer:ans,say:`和 ${n} 相邻的两个整十数是多少？`};
}

function renderMap(){
  const inner=$("#mapInner");const svg=$("#mapSvg");
  inner.querySelectorAll(".map-node,.node-tag,.map-legend").forEach(e=>e.remove());
  const W=inner.clientWidth||900,H=1050;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const rows=5,cols=6,padX=W*0.11,padY=110;
  const usableW=W-padX*2,usableH=H-padY*1.5;
  const pts=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cc=(r%2===0)?c:(cols-1-c);
      pts.push({x:padX+cc*usableW/(cols-1),y:padY+r*usableH/(rows-1)});
    }
  }
  let pathD="M"+pts.map(p=>`${p.x},${p.y}`).join(" L");
  svg.innerHTML=`<path d="${pathD}" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="1 26"/>`;
  for(let lv=1;lv<=30;lv++){
    const p=pts[lv-1];
    const node=document.createElement("button");
    node.className="map-node";
    node.style.left=p.x+"px";node.style.top=p.y+"px";
    const stars=save.stars[lv]||0;
    if(lv<save.unlocked||(save.stars[lv]&&lv<=save.unlocked)){
      node.classList.add("node-done");
      node.innerHTML=`<span class="lv-num">${lv}</span><span class="lv-stars">${"★".repeat(stars)}${"☆".repeat(3-stars)}</span>`;
      node.addEventListener("click",()=>{Sound.click();startLevel(lv);});
    }else if(lv===save.unlocked){
      node.classList.add("node-cur");
      node.innerHTML=`<span class="lv-num">${lv}</span><span class="lv-stars">▶</span>`;
      node.addEventListener("click",()=>{Sound.click();startLevel(lv);});
    }else{
      node.classList.add("node-lock");
      node.innerHTML=`<span style="font-size:22px">🔒</span>`;
    }
    inner.appendChild(node);
    const tag=document.createElement("div");
    tag.className="node-tag";tag.textContent=LEVEL_TAGS[lv-1];
    tag.style.left=p.x+"px";tag.style.top=(p.y+36)+"px";
    inner.appendChild(tag);
  }
  const legend=document.createElement("div");
  legend.className="map-legend";
  legend.innerHTML="🟢 已通关 &nbsp; 🟠 当前关 &nbsp; 🔒 未解锁<br>答对题目赚金币，去商城换装扮！";
  inner.appendChild(legend);

}

/* 语文：拼音选择题 + 看拼音写汉字（键盘输入） */
function genChineseQ(book){
  let pool=HANZI_ALL;
  if(book==="上册")pool=HANZI_SHANG;else if(book==="下册")pool=HANZI_XIA;
  const item=pick(pool);
  if(Math.random()<0.5){
    const opts=[item.py];
    let guard=0;
    while(opts.length<4&&guard++<50){const o=pick(pool).py;if(!opts.includes(o))opts.push(o);}
    shuffle(opts);
    return {kind:"choice",tag:"语文 · 拼音选择",q:`“ ${item.zi} ”的正确拼音是？`,hint:"",
      options:opts,answer:item.py,say:`汉字，${item.zi}，的正确拼音是哪一个？`};
  }
  return {kind:"input",tag:"语文 · 看拼音写汉字",q:`根据拼音写出汉字`,hint:`${item.py}`,
    answer:item.zi,inputMode:"text",ph:"输入一个汉字",
    say:`请根据拼音写汉字。`};
}
/* 数学：两位数加减法（键盘输入数字） */
function genMathQ(){
  const t=rnd(0,3);
  if(t===0){
    const a=rnd(10,89),b=rnd(10,100-a);
    return {kind:"input",tag:"数学 · 两位数加法",q:`${a} + ${b} = ?`,hint:"仔细看十位和个位哦",
      answer:String(a+b),inputMode:"numeric",ph:"输入数字",say:`${a}，加，${b}，等于几？`};
  }
  if(t===1){
    let a=rnd(11,99),b=rnd(10,a);
    return {kind:"input",tag:"数学 · 两位数减法",q:`${a} - ${b} = ?`,hint:"不够减要退位哦",
      answer:String(a-b),inputMode:"numeric",ph:"输入数字",say:`${a}，减，${b}，等于几？`};
  }
  if(t===2){
    const a=rnd(10,60),b=rnd(10,30),c=rnd(10,Math.min(99,a+b));
    return {kind:"input",tag:"数学 · 加减混合",q:`${a} + ${b} - ${c} = ?`,hint:"从左往右依次计算",
      answer:String(a+b-c),inputMode:"numeric",ph:"输入数字",say:`${a}，加，${b}，再减，${c}，等于几？`};
  }
  const a=rnd(10,80),ans=rnd(10,99-a),c=a+ans;
  const hideLeft=Math.random()<0.5;
  if(hideLeft)return {kind:"input",tag:"数学 · 填空小达人",q:`(　) + ${ans} = ${c}`,hint:"想想几加 "+ans+" 等于 "+c,
    answer:String(a),inputMode:"numeric",ph:"输入数字",say:`几加 ${ans} 等于 ${c}？`};
  return {kind:"input",tag:"数学 · 填空小达人",q:`${a} + (　) = ${c}`,hint:"想想 "+a+" 加几等于 "+c,
    answer:String(ans),inputMode:"numeric",ph:"输入数字",say:`${a} 加几等于 ${c}？`};
}

    [genQ_rmb,0.7],                // 认识人民币
    [genQ_qkb,0.5],                // 图形拼组/七巧板
    [genQ_baishu,0.6],             // 百数表
    [genQ_shufa,0.5],              // 计算方法
    [genQ_dayixie,0.5]             // 大一些/小得多
  ];
  let total=0;for(const g of gens)total+=g[1];
  let r=Math.random()*total;
  for(const g of gens){if(r<g[1])return g[0]();r-=g[1];}
  return genMathQ();
}

const cv=$("#gameCanvas"),ctx=cv.getContext("2d");

function updateGameHUD(){
  $("#gameHearts").textContent="❤️".repeat(G.hearts)+"🖤".repeat(Math.max(0,3-G.hearts));
  $("#gameProgress").textContent=`⭐ ${G.progress}/${G.cfg.target}`;
  $("#gameCoins").textContent=save.coins;
}
function randFreeCell(){
  for(let i=0;i<200;i++){
    const c={x:rnd(0,COLS-1),y:rnd(0,ROWS-1)};
    if(G.snake.some(s=>s.x===c.x&&s.y===c.y))continue;
    if(G.fruits.some(f=>f.x===c.x&&f.y===c.y))continue;
    return c;
  }
  return {x:0,y:0};
}
function spawnFruit(kind){
  const c=randFreeCell();
  G.fruits.push({x:c.x,y:c.y,kind,bob:Math.random()*Math.PI*2});
}
function burst(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,c:color,r:2+Math.random()*3});
  }
}

function gameStep(){
  if(G.paused||G.over)return;
  G.tick++;
  if(G.dirQueue.length)G.dir=G.dirQueue.shift();
  const head={x:G.snake[0].x+G.dir.x,y:G.snake[0].y+G.dir.y};
  const now=Date.now();
  /* 撞墙（始终判定）或撞自己（无敌时间内豁免） */
  const hitWall=head.x<0||head.y<0||head.x>=COLS||head.y>=ROWS;
  const hitSelf=now>G.invUntil&&G.snake.some(s=>s.x===head.x&&s.y===head.y);
  if(hitWall||hitSelf){loseHeart();return;}
  G.snake.unshift(head);
  const fi=G.fruits.findIndex(f=>f.x===head.x&&f.y===head.y);
  if(fi>=0){
    const f=G.fruits.splice(fi,1)[0];
    if(f.kind==="q"){
      Sound.eat();burst(head.x*CELL+20,head.y*CELL+20,"#ff5e62");
      G.grow+=1;
      askQuestion();
    }else{
      Sound.coin();Sound.praiseCoin();save.coins+=10;persist();
      burst(head.x*CELL+20,head.y*CELL+20,"#ffd200",20);
      updateGameHUD();
      /* 吃完金币后，保证场上始终有 ❓ 果子等你去答题 */
      if(G.fruits.filter(f=>f.kind==="q").length<3)spawnFruit("q");
      setTimeout(()=>{if(G&&!G.over)spawnFruit("coin");},4000);
    }
  }
  if(G.grow>0)G.grow--;else G.snake.pop();
  draw();
}

function loseHeart(){
  G.hearts--;Sound.hurt();updateGameHUD();
  burst(G.snake[0].x*CELL+20,G.snake[0].y*CELL+20,"#888",20);
  if(G.hearts<=0){levelFail();return;}
  G.snake=[{x:9,y:7},{x:8,y:7},{x:7,y:7}];
  G.dir={x:1,y:0};G.dirQueue=[];
  G.invUntil=Date.now()+1500;
  draw();
}

function askQuestion(){
  G.paused=true;
  const q=genQuestion(G.cfg);G.curQ=q;
  $("#qTag").textContent=q.tag;
  $("#qText").textContent=q.q;

  $("#qFeedback").textContent="";$("#qFeedback").className="";

  ch.innerHTML="";

    ch.classList.remove("hidden");row.classList.add("hidden");
    q.options.forEach(opt=>{

      b.className="choice-btn";b.textContent=opt;
      b.addEventListener("click",()=>answerChoice(b,opt));
      ch.appendChild(b);
    });
  }else{
    ch.classList.add("hidden");row.classList.remove("hidden");
    const inp=$("#qInput");

    $("#qEq").classList.toggle("hidden",!isEq);
    $("#qEqSign").classList.toggle("hidden",!isEq);
    inp.value="";inp.placeholder=isEq?"得数":(q.ph||"输入答案");

}
$("#qSpeak").addEventListener("click",()=>{
  Sound.click();
  if(G&&G.curQ&&G.curQ.say)Sound.readQ(G.curQ.say);
});
function answerChoice(btn,opt){
  if(!G.curQ)return;
  const q=G.curQ;G.curQ=null;
  const right=opt===q.answer;
  $$("#qChoices .choice-btn").forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer)b.classList.add("right");
  });
  if(!right)btn.classList.add("wrong");
  settleAnswer(right,q.answer);
}
/* 安全解析加减算式（支持全角符号、连等） */
function evalExpr(s){
  if(!s)return null;
  s=String(s).replace(/＋/g,"+").replace(/[－—–]/g,"-").replace(/\s/g,"").split("=")[0];
  const m=s.match(/^(\d+)([+-])(\d+)(?:([+-])(\d+))?$/);
  if(!m)return null;
  let v=(+m[1])+(m[2]==="+"?+m[3]:-m[3]);
  if(m[4])v+=(m[4]==="+"?+m[5]:-m[5]);
  return v;
}
function submitInput(){
  if(!G.curQ)return;
  const q=G.curQ;G.curQ=null;
  if(q.kind==="equation"){
    /* 应用题：学生自己列算式 + 写得数，两者都要对 */
    const eqVal=evalExpr($("#qEq").value);
    const resVal=$("#qInput").value.trim();
    const right=(eqVal===Number(q.answer))&&(resVal===q.answer);
    settleAnswer(right,`${q.expr} = ${q.answer}`);
    return;
  }
  const val=$("#qInput").value.trim();
  settleAnswer(val===q.answer,q.answer);
}
function settleAnswer(right,answer){
  const fb=$("#qFeedback");
  if(right){
    fb.textContent=pick(["🎉 太棒了！+5 金币","🌟 回答正确！+5 金币","👏 你真聪明！+5 金币","💯 完全正确！+5 金币"]);
    fb.className="fb-right";
    Sound.correct();Sound.praise();save.coins+=5;G.progress++;
    burst(G.snake[0].x*CELL+20,G.snake[0].y*CELL+20,"#56ab2f",24);
  }else{
    fb.textContent=`😅 答错啦，正确答案是：${answer}`;
    fb.className="fb-wrong";
    Sound.wrong();Sound.encourage();G.hearts--;
  }
  persist();updateGameHUD();
  setTimeout(()=>{
    $("#qOverlay").classList.add("hidden");
    if(G.over)return;
    if(G.progress>=G.cfg.target){levelComplete();return;}
    if(G.hearts<=0){levelFail();return;}
    spawnFruit("q");
    G.paused=false;
  },right?1100:1800);
}

/* ---------- 画面绘制 ---------- */
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  /* 阳光天空 */
  const sky=ctx.createLinearGradient(0,0,0,cv.height);
  sky.addColorStop(0,"#fffde7");sky.addColorStop(0.5,"#e8f5e9");sky.addColorStop(1,"#dcedc8");
  ctx.fillStyle=sky;ctx.fillRect(0,0,cv.width,cv.height);
  const t=Date.now()/300;
  /* 小太阳 */
  ctx.save();
  ctx.translate(cv.width-58,52);
  ctx.rotate(Date.now()/4000);
  ctx.strokeStyle="rgba(255,193,7,.85)";ctx.lineWidth=4;ctx.lineCap="round";
  for(let i=0;i<10;i++){const a=i*Math.PI/5;ctx.beginPath();ctx.moveTo(Math.cos(a)*32,Math.sin(a)*32);ctx.lineTo(Math.cos(a)*42,Math.sin(a)*42);ctx.stroke();}
  ctx.rotate(-Date.now()/4000);
  const sg=ctx.createRadialGradient(0,0,4,0,0,26);
  sg.addColorStop(0,"#fff9c4");sg.addColorStop(1,"#ffc107");
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.fill();
  ctx.restore();
  /* 飘动的云朵 */
  ctx.fillStyle="rgba(255,255,255,.9)";
  for(let i=0;i<3;i++){
    const cx=((Date.now()/90+i*300)%(cv.width+180))-90,cy=36+i*54;
    ctx.beginPath();
    ctx.arc(cx,cy,16,0,Math.PI*2);ctx.arc(cx+18,cy-8,13,0,Math.PI*2);ctx.arc(cx+36,cy,15,0,Math.PI*2);
    ctx.fill();
  }
  /* 棋盘格 */
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if((x+y)%2===0){ctx.fillStyle="rgba(255,255,255,.35)";ctx.fillRect(x*CELL,y*CELL,CELL,CELL);}
  }
  /* 底部草地花边 */
  ctx.fillStyle="rgba(139,195,74,.5)";
  ctx.fillRect(0,cv.height-10,cv.width,10);
  ctx.font="14px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
  const flowers=["🌼","🌷","🌸","🍀","🌻"];
  for(let i=0;i<10;i++){ctx.fillText(flowers[i%flowers.length],30+i*82,cv.height-16);}
  /* 果子 */
  for(const f of G.fruits){
    const cx=f.x*CELL+CELL/2,cy=f.y*CELL+CELL/2+Math.sin(t+f.bob)*3;
    ctx.save();
    ctx.shadowBlur=14;
    if(f.kind==="q"){
      ctx.shadowColor="#ff8a65";
      ctx.fillStyle="#ff7043";
      ctx.beginPath();ctx.arc(cx,cy,15,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle="#fff";ctx.font="bold 20px sans-serif";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("?",cx,cy+1);
    }else{
      ctx.shadowColor="#ffd200";ctx.shadowBlur=18;
      ctx.font="26px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("🪙",cx,cy);
    }
    ctx.restore();
  }
  /* 蛇 */
  const skin=getSkin(),hat=getHat();
  const n=G.snake.length;
  const flash=Date.now()<G.invUntil&&Math.floor(Date.now()/120)%2===0;
  for(let i=n-1;i>=0;i--){
    const s=G.snake[i];
    let color;
    if(skin.c1==="rainbow")color=`hsl(${(i*22+Date.now()/12)%360},75%,55%)`;
    else if(skin.alt&&i>0)color=(i%2===0)?skin.c1:(skin.c3||skin.c2);
    else color=i===0?skin.c2:skin.c1;
    if(flash)color="#ffffff";
    const px=s.x*CELL,py=s.y*CELL;
    const inset=i===0?2:4;
    ctx.fillStyle=color;
    roundRect(px+inset,py+inset,CELL-inset*2,CELL-inset*2,i===0?12:9);
    ctx.fill();
    if(i===0){
      /* 眼睛 */
      ctx.fillStyle="#fff";
      const ex=G.dir.x,ey=G.dir.y;
      const cx=px+CELL/2,cy=py+CELL/2;
      const ox=ey*7,oy=ex*7;
      ctx.beginPath();ctx.arc(cx+ex*6+ox,cy+ey*6+oy,5.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+ex*6-ox,cy+ey*6-oy,5.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#222";
      ctx.beginPath();ctx.arc(cx+ex*8+ox,cy+ey*8+oy,2.8,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+ex*8-ox,cy+ey*8-oy,2.8,0,Math.PI*2);ctx.fill();
      /* 舌头 */
      if(Math.floor(Date.now()/500)%2===0){
        ctx.strokeStyle="#e53935";ctx.lineWidth=2.5;
        ctx.beginPath();
        ctx.moveTo(cx+ex*16,cy+ey*16);
        ctx.lineTo(cx+ex*22,cy+ey*22);
        ctx.stroke();
      }
      /* 帽子 */
      if(hat.icon!=="🚫"){
        ctx.font="22px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(hat.icon,cx,py-6);
      }
    }
  }
  /* 粒子 */
  G.parts=G.parts.filter(p=>p.life>0);
  for(const p of G.parts){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.03;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.c;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

const DIRS={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
function queueDir(name){
  if(!G||G.paused||G.over)return;
  const d=DIRS[name];if(!d)return;
  const last=G.dirQueue.length?G.dirQueue[G.dirQueue.length-1]:G.dir;
  if(d.x===-last.x&&d.y===-last.y)return;
  if(d.x===last.x&&d.y===last.y)return;
  if(G.dirQueue.length<3)G.dirQueue.push(d);
}

    const map={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",w:"up",s:"down",a:"left",d:"right",W:"up",S:"down",A:"left",D:"right"};
    if(map[e.key]){e.preventDefault();queueDir(map[e.key]);}
  }
});
